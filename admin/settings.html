<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Admin</title>
  <link rel="stylesheet" href="assets/admin.css">
</head>
<body>
  <div class="admin-layout">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><h1>🪑 Furniture CMS</h1><button class="sidebar-toggle" id="sidebarToggle">✕</button></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
        <a href="products.html"><span class="icon">📦</span> Products</a>
        <a href="categories.html"><span class="icon">📂</span> Categories</a>
        <a href="sections.html?productId=1"><span class="icon">📄</span> Sections</a>
        <a href="gallery.html?productId=1"><span class="icon">🖼️</span> Gallery</a>
        <a href="faqs.html?productId=1"><span class="icon">❓</span> FAQs</a>
        <a href="specifications.html?productId=1"><span class="icon">📋</span> Specifications</a>
        <a href="settings.html" class="active"><span class="icon">⚙️</span> Settings</a>
      </nav>
      <div class="sidebar-footer"><a href="#" id="btnLogoutSidebar"><span class="icon">🚪</span> Logout</a></div>
    </aside>
    <main class="main-content">
      <div class="main-header"><h2>⚙️ Settings</h2><span id="sidebarUser" style="font-size:13px;color:#64748b;"></span></div>

      <div class="card" style="max-width:600px;">
        <div class="card-header"><h3>Admin Profile</h3></div>
        <div class="form-group"><label>Name</label><input type="text" id="displayName" class="form-control" disabled></div>
        <div class="form-group"><label>Email</label><input type="email" id="displayEmail" class="form-control" disabled></div>
      </div>

      <div class="card" style="max-width:600px;">
        <div class="card-header"><h3>Change Password</h3></div>
        <form id="changePasswordForm">
          <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword" class="form-control"></div>
          <div class="form-group"><label>New Password</label><input type="password" id="newPassword" class="form-control"></div>
          <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPassword" class="form-control"></div>
          <button type="submit" class="btn btn-primary">Update Password</button>
        </form>
      </div>
    </main>
  </div>
  <script src="assets/dashboard.js"></script>
  <script src="assets/settings.js"></script>
  <script>
    document.getElementById('btnLogoutSidebar').addEventListener('click', function(e) { e.preventDefault(); if (confirm('Logout?')) window.Admin.logout(); });
  </script>
</body>
</html>
